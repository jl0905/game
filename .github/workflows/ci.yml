name: CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Run harness regression scripts
        shell: pwsh
        run: |
          $exe = "build/Release/openwarband.exe"
          if (-not (Test-Path $exe)) { $exe = "build/openwarband.exe" }
          $failed = @()
          Get-ChildItem tests -Filter *.txt | ForEach-Object {
            Write-Host "=== $($_.Name) ==="
            & cmd /c "`"$exe`" --script `"$($_.FullName)`" > out.txt 2>&1"
            Get-Content out.txt
            if ($LASTEXITCODE -ne 0 -or -not (Select-String -Path out.txt -Pattern "harness: done" -Quiet)) {
              $failed += $_.Name
            }
          }
          if ($failed.Count -gt 0) { Write-Error "Failed scripts: $($failed -join ', ')"; exit 1 }
