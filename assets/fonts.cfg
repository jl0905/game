# OpenWarband font configuration
# -------------------------------
# Modders: point these at any .ttf or .otf font you like. Paths are relative to
# the assets/ directory. Drop your font file in assets/fonts/ and change the
# line below. Restart the game to apply. If a font fails to load the game falls
# back to raylib's built-in font, so a typo here never crashes the game.

# Main UI / HUD / body text.
body  = fonts/Spectral-Medium.ttf

# Headings and screen / settlement titles.
title = fonts/Cinzel-Variable.ttf

# Glyph atlas resolution in pixels. Higher = crisper large text but more memory.
# Text is never drawn larger than this without softening, so keep it >= your
# biggest heading size.
atlas = 96

# Global text scale (U13): every screen's text, 0.8-1.6. Default 1.2.
scale = 1.2
