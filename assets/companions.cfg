# OpenWarband moddable companions (V83). One line each:
#   companion <id> <Name_with_underscores> <perk> <temper> <hire-cost>
# Perks reuse the built-in hook strings: surgeon (3/4 of the fallen live),
# scout (+15% march), quartermaster (grain feeds 30), drillmaster (dawn XP),
# jailer (no escapes, richer ransoms) - or "none" for a plain blade.
# Tempers: "honorable" objects to black deeds, "grim" approves of them.
# Every companion joins the tavern rotation like the built-in five.

companion wren Wren_the_Swift scout honorable 120
