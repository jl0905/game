# OpenWarband moddable armour (V99). One per line:
#   armor <id> <Name_with_underscores> <slot> <soak>
# Slots: head body hands feet. Soak is flat damage reduction (V15 tiers:
# cloth 1, iron helms 3, mail 4, plate 6). Loads before troops.cfg, so
# modded troops can wear modded plate; pieces drop as loot and wear in the
# paper-doll like any built-in.

armor brigandine Brigandine body 5
