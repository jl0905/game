# OpenWarband settings. Missing keys keep their defaults. The in-game
# settings screen (O) rewrites this file on exit.
#   width / height   window size in pixels (takes effect on restart)
#   fullscreen       on | off
#   loddist          soldiers beyond this distance draw as simple silhouettes
#                    (lower = faster on weak GPUs, higher = prettier)
#   particles        on | off   blood and hoof-dust puffs
#   volume           0.0 .. 1.0 master audio volume
#   inverty          on | off   flip vertical mouse look
#   textscale        1.0 .. 1.6 global lettering size (V72)
#   battlesize       field-battle cap per side (V75); overflow
#                    arrives as reinforcement waves

width 1280
height 720
fullscreen off
loddist 45
particles on
volume 1.00
inverty off
textscale 1.40
battlesize 200
