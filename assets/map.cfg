# OpenWarband overworld map.
# Modders: reshape the world here — no rebuild needed. Format:
#   size    <world units, square>          (default 2000)
#   start   <x> <y>                        (player start; default centre)
#   parties <n>                            (roaming faction parties at start)
#   town    <Name> <village|town|castle> <x> <y> <ownerFactionId|player|none>
# Names are one token. The first `town` line replaces the built-in list.
# Owner ids come from the faction registry (src/content.cpp): player, patrol,
# deserters, raiders, sarleon, vaeling.

size 3000
start 1500 1500
parties 16

town Sargoth   town    600  600   player
town Praven    castle  2400 750   patrol
town Tulga     village 750  2325  deserters
town Jelkala   town    2250 2250  patrol
town Curaw     town    1500 390   sarleon
town Rivacheg  castle  390  1500  vaeling
town Halmar    town    2700 1500  sarleon
town Skjold    village 900  2700  vaeling
town Emberfall village 1950 900   patrol

# The outer marches (U12): nine more settlements filling the empty land —
# APPENDED so the first nine keep their indices (test scenarios rely on
# them). The map now stresses the campaign sim as battles stress the grid.
town Veidar    town    300  300   vaeling
town Ashfield  village 750  450   sarleon
town Dunmore   castle  2700 300   patrol
town Saltcliff village 2700 900   sarleon
town Farwatch  castle  300  2100  vaeling
town Milldale  village 1200 2700  deserters
town Greymoor  town    2100 2700  raiders
town Thornholt village 2400 1800  patrol
town Coldharbour town  900  1200  vaeling

# Bandit dens: breed outlaw parties until the player burns them out.
lair raiders   2650 2650
lair deserters 350  2650
lair raiders   450  750    # the northern marches breed trouble too (U12)
lair deserters 2250 450

# Biome field (K8): one noise formula paints the map, sets march speed and
# seeds every battlefield. Values are the defaults; uncomment to reshape.
#   biome <hillFreqX> <hillFreqY> <forestFreqX> <forestFreqY>
#         <forestThreshold> <mountainThreshold> <forestSpeed> <mountainSpeed>
biome 0.0031 0.0027 0.0012 0.0019 0.35 0.55 0.70 0.55

# Roads join settlements closer than the link distance; within the width a
# party marches at full pace whatever the ground.
#   road <linkDist> <width>
road 1350 20

# Name pool for lords the crowned player raises (L in an owned settlement).
# The pool size is also the maximum number of raised lords.
lordnames Bram Edric Sable Corwin
