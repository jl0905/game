# OpenWarband moddable world events (V90). One per line, joins the day
# rotation beside the built-in three:
#   event <id> <Name_with_underscores> <News_with_underscores_%s> \
#         <prosperityDelta> <stockDelta> <spawnParties> <poolDelta>
# %s in the news becomes the struck settlement's name. Prosperity is
# clamped 30..150, stock floors at 0, spawnParties raises outlaw bands at
# the site, poolDelta swings the recruit pool.

event fairday Fair_Day A_great_fair_is_held_at_%s! 15 4 0 1
