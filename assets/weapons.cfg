# OpenWarband moddable weapons (V98). One per line:
#   weapon <id> <Name_with_underscores> <class> <damage> <reach> [range speed]
# Classes: onehanded twohanded polearm axe ranged (ranged takes the two
# extra numbers: missile range and speed). Reach 0 keeps the class default.
# Loads before troops.cfg, so modded troops can wield modded steel.

weapon warhammer Warhammer axe 12 0
