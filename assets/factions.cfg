# OpenWarband moddable factions (V104). Three line kinds:
#   faction <id> <Name_with_underscores> <r> <g> <b> <behavior> [kingdom] [mercenary]
#   lord <faction-id> <lord-name>
#   war <faction-id> <faction-id>
# Behaviors: patrol aggressive passive. New crowns spawn roaming parties
# and lord hosts automatically; rosters default to recruits until
# troops.cfg `recruit` lines enlist real levies. Outlaws (raiders,
# deserters) war on every faction automatically, new ones included.

faction nords Nords 150 60 50 patrol kingdom
lord nords Ragnar
war nords sarleon
