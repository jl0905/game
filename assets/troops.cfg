# OpenWarband moddable troops (V85). Two line kinds:
#   troop <id> <Name_with_underscores> <weapon-id> <armor-id> <wage> <cost> [mounted]
#   recruit <faction-id> <troop-id>
# Weapon ids: sword great spear bow axe daneaxe xbow pike
# Armor (body) ids: tunic mail plate fur    Factions: player patrol sarleon
# vaeling raiders deserters freecompany travellers
# New troops always append, so existing handles and saves stay valid.

troop halberdier Halberdier great mail 3 40
recruit patrol halberdier

# V98 chained sample: a modded troop swinging a modded weapon.
troop hammerman Hammerman warhammer mail 3 40
recruit vaeling hammerman

# V103: promotion ladders from data - upgrade <from> <to> [xp].
upgrade halberdier hammerman
