# OpenWarband moddable trade goods (V95). One per line:
#   good <id> <Name_with_underscores> <basePrice> <raw 0|1>
# raw=1 goods are village produce (cheap at the source, dear in towns);
# raw=0 is town craftwork flowing the other way. New wares always append,
# so shelves, caravans, quests and events pick them up automatically.

good ale Ale 10 0
